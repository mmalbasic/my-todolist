<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .todo-list {
      list-style-type: none;
      padding: 0;
    }
    .todo-item {
      background-color: #fff;
      margin: 5px 0;
      padding: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
    }
    .todo-item button {
      background-color: red;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    .todo-item button:hover {
      background-color: darkred;
    }
    input[type="text"] {
      padding: 8px;
      margin-right: 10px;
      width: 300px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      padding: 8px 15px;
      background-color: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: darkgreen;
    }
  </style>
</head>
<body>
  <h1>To-Do List</h1>
  <div style="text-align: center;">
    <input type="text" id="newTodo" placeholder="Add a new to-do" />
    <button onclick="addTodo()">Add Todo</button>
  </div>
  <ul class="todo-list" id="todoList"></ul>

  <script>
    const apiUrl = 'http://localhost:7071/api/todo'; // Local API endpoint (replace with your live function URL when deployed)

    // Fetch todos from the backend and render them
    async function fetchTodos() {
      try {
        const response = await fetch(apiUrl);
        const todos = await response.json();
        const todoList = document.getElementById('todoList');
        todoList.innerHTML = ''; // Clear the existing list

        todos.forEach(todo => {
          const li = document.createElement('li');
          li.classList.add('todo-item');
          li.innerHTML = `
            <span>${todo.text}</span>
            <button onclick="deleteTodo('${todo.id}')">Delete</button>
          `;
          todoList.appendChild(li);
        });
      } catch (error) {
        console.error('Error fetching todos:', error);
      }
    }

    // Add a new todo to the backend
    async function addTodo() {
      const newTodoText = document.getElementById('newTodo').value;
      if (!newTodoText) return; // Don't add empty todos

      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: newTodoText }),
        });

        const newTodo = await response.json();
        fetchTodos(); // Refresh the list
        document.getElementById('newTodo').value = ''; // Clear the input
      } catch (error) {
        console.error('Error adding todo:', error);
      }
    }

    // Delete a todo from the backend
    async function deleteTodo(id) {
      try {
        await fetch(apiUrl, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id }),
        });
        fetchTodos(); // Refresh the list after deletion
      } catch (error) {
        console.error('Error deleting todo:', error);
      }
    }

    // Load todos when the page loads
    window.onload = fetchTodos;
  </script>
</body>
</html>
